kind = "web"
previewPath = "/"
title = "TravelSage AI"
version = "1.0.0"
id = "artifacts/travelsage-ai"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22155

[services.development]
run = "pnpm --filter @workspace/travelsage-ai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/travelsage-ai", "run", "build" ]
publicDir = "artifacts/travelsage-ai/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22155"
BASE_PATH = "/"
